<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"
    <title>"ClienteHub"</title>
    <link rel="stylesheet" href="style.css"
</head>    
<body>

    <h1> Relatório de Clientes</h1>

    <div class="filtros"
        <input type="text" placeholder="Nome do Cliente"

        <select>
            <option>Status</option>
            <option>Ativo</option>
            <option>Inativo</option>
        </select>

        <input type-="date">

        <button>Gerar Relatório</button>
    </div>

    <div class-="tabela">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Saldo</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>João</td>
                    <td>R$ 1500</td>
                    <td>Ativo</td>
                </tr>
            </tbody>
            <tbody>
                <tr>
                    <td>Maria</td>
                    <td>3200</td>
                    <td>Inativo</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="exportar"
        <button>Exportar CSV</button>
        <button>Exporar Excel</button>
</div>

</body>
</html>
