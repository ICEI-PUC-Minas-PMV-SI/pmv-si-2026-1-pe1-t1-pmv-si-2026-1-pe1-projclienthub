<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Hub</title>
  <img src="imgs/logoCH.png" height="10%" width="15%" alt="Client Hub Logo">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <nav>
    <span>LARISSA G. SALES | ID: 7688</span> <br>
    <span>LARISSAGS@CLIENTHUB.COM</span>

    <div class="opcoes">
      <ul>
        <li><a href="dashboard.html">DASHBOARD</li></a>
        <li><a href="pesquisa.html">PESQUISAR</li></a>
        <li><a href="perfilCliente.html">CLIENTES</li></a>
        <li><a href="historico.html">HISTORICO</li></a>
        <li><a href="info.html">SOBRE ClientHub</li></a>
      </ul>
    </div>
  </nav>

  <article class="barra-pesquisa pesquisa-clientes">
    <input
      type="text"
      id="client-search"
      placeholder="Pesquise por CPF/CNPJ, ID interno ou nome"
      autocomplete="off"
    >
    <div id="search-suggestions" class="search-suggestions"></div>
    <div id="search-confirmation" class="search-confirmation" hidden></div>
  </article>

  <article class="historico-busca">
    <span>Clientes</span>

    <div class="results-toolbar">
      <span id="results-summary">Carregando clientes...</span>
    </div>

    <div class="clients-table-wrapper">
      <table class="clients-table">
        <thead>
          <tr>
            <th><button type="button" class="sort-button" data-sort-key="internalId">ID</button></th>
            <th><button type="button" class="sort-button" data-sort-key="nome">Nome</button></th>
            <th><button type="button" class="sort-button" data-sort-key="documento">CPF/CNPJ</button></th>
            <th><button type="button" class="sort-button" data-sort-key="cidade">Cidade</button></th>
            <th><button type="button" class="sort-button" data-sort-key="perfil_investidor">Perfil</button></th>
            <th><button type="button" class="sort-button" data-sort-key="score">Score</button></th>
            <th><button type="button" class="sort-button" data-sort-key="adimplencia">Status</button></th>
            <th>Acao</th>
          </tr>
        </thead>
        <tbody id="clients-table-body"></tbody>
      </table>
    </div>

    <div class="pagination-bar">
      <button type="button" id="prev-page">Anterior</button>
      <span id="page-indicator">Pagina 1 de 1</span>
      <button type="button" id="next-page">Proxima</button>
    </div>
  </article>

  <footer>© 2026 ClientHub Solutions</footer>
  <script src="js/pesquisa.js"></script>

</body>

</html>
