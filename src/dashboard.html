<script>
  setTimeout(()=>{
const chartConfig = {
  series: [score.baixo, score.medio, score.alto],
  chart: {
    type: "pie",
    width: 520,
    height: 350,
    toolbar: {
      show: false,
    },
  },
  labels:[
    'Baixo - 0 a 150',
    'Medio - 151 a 450',
    'Alto - + 451',
   
  ],
  title: {
    show: "",
  },
  dataLabels: {
    enabled: true,
  },
  colors: ["#020617", "#ff8f00", "#00897b", "#1e88e5", "#d81b60"],
  legend: {
    show: true,
     fontSize:'17px',

     labels:{
       colors: ['#ffffff','#ffffff','#ffffff'],
     },
    
  },
};
 
const chart = new ApexCharts(document.querySelector("#pie-chart"), chartConfig);
 
chart.render();
  },500);
</script>
